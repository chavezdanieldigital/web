<script>
	// 🔒 Credenciales (HASH de CMEAdmiN)
	const USUARIO_CORRECTO = "admin";
	const HASH_CLAVE_CORRECTA = "782245e38104889c3a32502685955627f6789f258a434199f116773322d7657b";


	/**
	 * Función asíncrona que calcula el hash SHA-256. (Sin cambios)
	 * @param {string} text La cadena a hashear.
	 * @returns {Promise<string>} El hash en formato hexadecimal.
	 */
	async function calculateHash(text) {
		const encoder = new TextEncoder();
		const data = encoder.encode(text);
		const hashBuffer = await crypto.subtle.digest('SHA-256', data);
		const hashArray = Array.from(new Uint8Array(hashBuffer));
		const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
		return hashHex;
	}

	// ---------------------------------------------------------------------

	/**
	 * Función para cerrar sesión (síncrona).
	 */
	function cerrarSesion() {
		document.getElementById('admin-content').style.display = 'none';
		document.getElementById('login-form').style.display = 'block';
		document.getElementById('username').value = "";
		document.getElementById('password').value = "";
		document.getElementById('mensaje-error').textContent = "";
	}

	// ---------------------------------------------------------------------

	/**
	 * 🎯 PUNTO CRÍTICO: Se adjunta la lógica de autenticación al evento SUBMIT.
	 * Esto garantiza que la función sea llamada SÓLO después de que el DOM y las
	 * funciones hayan cargado, eliminando el ReferenceError.
	 */
	document.getElementById('login-form').addEventListener('submit', async function (event) {
		event.preventDefault(); // Detiene el envío del formulario para manejarlo con JS

		const usuarioInput = document.getElementById('username').value;
		const claveInput = document.getElementById('password').value;
		const mensajeError = document.getElementById('mensaje-error');

		mensajeError.textContent = "";

		// 1. Verificar Usuario
		if (usuarioInput !== USUARIO_CORRECTO) {
			mensajeError.textContent = "❌ Usuario o contraseña incorrectos.";
			return;
		}

		// 2. Generar el Hash
		try {
			// Aquí es donde se llama a calculateHash, ahora dentro de un contexto seguro
			const hashedPassword = await calculateHash(claveInput);

			// 3. Simular la verificación comparando los hashes
			if (hashedPassword === HASH_CLAVE_CORRECTA) {
				console.log('✅ Autenticación Exitosa por Hash!');
				document.getElementById('login-form').style.display = 'none';
				document.getElementById('admin-content').style.display = 'block';
			} else {
				mensajeError.textContent = "❌ Usuario o contraseña incorrectos.";
			}

		} catch (error) {
			console.error('❌ Error interno. El hashing ha fallado. Revisa el entorno (Live Server/HTTPS).',
				error);
			mensajeError.textContent = "❌ Error interno de seguridad. (Revisa la consola)";
		}
	});
